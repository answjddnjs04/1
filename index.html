<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiVibe - AI Knowledge Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* 수식 렌더링 시 글자 크기 조절 */
        .mjx-chtml { font-size: 110% !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="h-screen overflow-hidden bg-[#0f0f0f]">
    
    <div id="landing-page" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#0f0f0f] transition-opacity duration-500">
        <h1 class="mb-8 text-3xl font-bold text-[#a0a0a0]">어떤 지식을 확장하고 싶으신가요?</h1>
        <div class="relative w-full max-w-xl px-6">
            <input type="text" id="search-input" placeholder="파이썬 마스터하기, 영어 원서 읽기..." 
                   class="w-full px-8 py-5 bg-[#1a1a1a] border-2 border-[#2a2a2a] rounded-full text-xl outline-none focus:border-[#00d4ff] text-white transition-all">
            <button id="search-btn" class="absolute right-10 top-1/2 -translate-y-1/2 text-[#00d4ff] hover:scale-110 transition-transform">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-full w-full opacity-0 transition-opacity duration-500">
        <aside class="w-[400px] bg-[#1a1a1a] border-r border-[#2a2a2a] flex flex-col z-50">
            <div class="p-8 border-b border-[#2a2a2a]">
                <h2 class="text-xl font-bold text-white">AI Knowledge Assistant</h2>
                <p id="target-title" class="text-[#00d4ff] mt-1 font-medium"></p>
            </div>
            <div id="chat-box" class="flex-1 p-6 space-y-4 overflow-y-auto custom-scroll">
                <div class="p-4 bg-[#2a2a2a] rounded-2xl rounded-tl-none max-w-[85%] shadow-md">
                    <p class="text-sm text-[#f0f0f0]">반갑습니다! 주제를 클릭하고 질문을 던져 지식의 지도를 그려보세요.</p>
                </div>
            </div>
            <div class="p-6 border-t border-[#2a2a2a]">
                <input type="text" id="chat-input" placeholder="선택한 노드에 대해 질문하세요..." 
                       class="w-full bg-[#0f0f0f] border-2 border-[#2a2a2a] rounded-xl px-5 py-4 text-white outline-none focus:border-[#00d4ff] transition-all">
            </div>
        </aside>

        <main id="mindmap-container" class="flex-1 bg-[#111] relative overflow-hidden">
            <div id="mindmap-canvas" class="absolute inset-0 origin-center">
                <div class="absolute inset-[-5000px] opacity-[0.03]" 
                     style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>
            </div>
            
            <div class="absolute top-6 left-6 z-[70]">
                <div class="px-4 py-2 bg-[#1a1a1a]/80 backdrop-blur-md border border-[#2a2a2a] rounded-lg text-xs text-[#a0a0a0] shadow-xl">
                    Active Map: <span id="map-status" class="text-[#00d4ff]">None</span>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initMindmap, addNewSubNode } from './mindmap.js';

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('search-input');
            const searchBtn = document.getElementById('search-btn');
            const chatInput = document.getElementById('chat-input');
            const landingPage = document.getElementById('landing-page');
            const mainApp = document.getElementById('main-app');

            const launchProject = () => {
                const val = searchInput?.value.trim() || "Knowledge Expansion";
                document.getElementById('target-title').innerText = val;
                document.getElementById('map-status').innerText = val;

                landingPage.style.opacity = '0';
                setTimeout(() => {
                    landingPage.classList.add('hidden');
                    mainApp.classList.remove('hidden');
                    setTimeout(() => mainApp.style.opacity = '1', 50);
                    initMindmap(val);
                }, 500);
            };

            searchBtn?.addEventListener('click', launchProject);
            searchInput?.addEventListener('keypress', (e) => e.key === 'Enter' && launchProject());

            // [수정] 채팅 입력 시 수식 렌더링 트리거 추가
            chatInput?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && chatInput.value.trim() !== "") {
                    const topic = chatInput.value;
                    addNewSubNode(topic);
                    
                    const chatBox = document.getElementById('chat-box');
                    if (chatBox) {
                        const msg = document.createElement('div');
                        msg.className = "p-4 bg-[#2a2a2a] self-end rounded-2xl rounded-tr-none max-w-[85%] ml-auto text-right mb-4 shadow-sm border-r-2 border-[#00d4ff]";
                        msg.innerHTML = `<p class="text-sm text-[#f0f0f0]">${topic}</p>`;
                        chatBox.appendChild(msg);
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                    chatInput.value = "";

                    // [추가] AI 응답 후 수식이 예쁘게 변하도록 트리거 실행 (약간의 지연시간 필요)
                    setTimeout(() => {
                        if (window.MathJax) MathJax.typesetPromise();
                    }, 500);
                }
            });
        });
    </script>
</body>
</html>
